<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MapleStory Private Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo"></a>
    <ul class="nav-links"></ul>
    <button class="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Registration Form -->
  <div class="register-container section">
    <form id="register-form" class="register-form" novalidate>
      <h1>Create Account</h1>
      <p class="subtitle">Register to start playing.</p>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" maxlength="32" required>
        <div class="form-error"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" maxlength="12" required>
        <div class="password-strength"><div class="password-strength-bar"></div></div>
        <div class="form-error"></div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" maxlength="12" required>
        <div class="form-error"></div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
        <div class="form-error"></div>
      </div>

      <div class="form-group">
        <label for="birthday">Birthdate</label>
        <input type="date" id="birthday" name="birthday" required>
        <div class="form-error"></div>
      </div>

      <button type="submit" class="btn btn-primary form-submit">Create Account</button>
      <div class="form-message"></div>
    </form>
  </div>

  <!-- Footer -->
  <footer class="footer"></footer>

  <script src="config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
